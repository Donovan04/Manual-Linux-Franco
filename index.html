<hr>

<h2>CHMOD</h2>
<p>Cambia permisos de archivos y directorios.</p>
<h3>Opciones</h3>
<ul>
    <li>chmod 644</li>
    <li>chmod 755</li>
    <li>chmod u+x</li>
</ul>
<h3>Ejemplos</h3>
<pre>
chmod 644 documento.txt
chmod 755 script.sh
chmod u+x script.sh
</pre>
